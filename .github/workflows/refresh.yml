name: Refresh dashboard data

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch + transform TATA data
        env:
          TATA_TOKEN: ${{ secrets.TATA_TOKEN }}
          DAYS_BACK: "44"
        run: python scripts/sync.py

      - name: Sync index.html to dashboard
        run: cp inbound-dashboard.html index.html

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- inbound-dashboard-data.js index.html; then
            echo "No data change — nothing to commit."
          else
            git add inbound-dashboard-data.js index.html
            git commit -m "Auto-refresh data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi

      - name: Business-health alert (emails only if something is wrong)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/alert.py

      - name: Notify on sync failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          u=os.environ["GMAIL_USER"]; p=os.environ["GMAIL_APP_PASSWORD"]
          to="rohit.bagga@myhq.in"
          m=MIMEText("The 3-hourly data refresh workflow FAILED.\n"
                     "Check: https://github.com/myHQBuddy/inbound-dashboard/actions","plain","utf-8")
          m["Subject"]="🔴 Inbound sync FAILED"; m["From"]=u; m["To"]=to
          with smtplib.SMTP_SSL("smtp.gmail.com",465) as s:
              s.login(u,p); s.sendmail(u,[to],m.as_string())
          print("failure email sent")
          PY
